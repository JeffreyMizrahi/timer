<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Outfit:wght@200;300;400;500&family=Playfair+Display:wght@300;400&family=JetBrains+Mono:wght@200;300;400&family=Crimson+Pro:wght@300;400&family=Syne:wght@400;500;600;700&family=IBM+Plex+Sans:wght@200;300;400&family=Cormorant+Garamond:wght@300;400;500&family=Inter+Tight:wght@200;300;400;500&family=Libre+Baskerville:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;overflow:hidden;user-select:none;transition:background 0.6s ease}
.container{position:relative;display:flex;flex-direction:column;align-items:center;gap:28px;z-index:1}
.ring-wrap{position:relative;width:min(65vmin,340px);height:min(65vmin,340px)}
svg.ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
.track{fill:none;stroke-width:6;transition:stroke 0.6s}
.progress{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.3s ease, stroke 0.6s}
.glow{fill:none;stroke-width:14;stroke-linecap:round;opacity:0.12;transition:stroke-dashoffset 0.3s ease, stroke 0.6s}
.time-display{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:2px}
.time-display.editing .sep{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.field{background:none;border:none;outline:none;font-weight:200;letter-spacing:1px;font-variant-numeric:tabular-nums;text-align:center;width:2.2ch;padding:0;transition:color 0.6s, caret-color 0.6s, font-family 0.4s, font-size 0.3s, font-weight 0.4s}
.field::selection{background:rgba(120,120,255,0.2)}
.field:not(:focus){cursor:pointer}
.field:focus{cursor:text}
.sep{font-weight:200;pointer-events:none;transition:color 0.6s, font-family 0.4s, font-size 0.3s}
.label{font-size:min(2.2vmin,12px);text-transform:uppercase;letter-spacing:4px;font-weight:400;position:absolute;bottom:22%;left:50%;transform:translateX(-50%);transition:color 0.6s}
.controls{display:flex;gap:14px;align-items:center}
.btn{width:46px;height:46px;border-radius:50%;border:1px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;background:transparent}
.btn:hover{transform:scale(1.08)}
.btn:active{transform:scale(0.95)}
.btn.primary{width:54px;height:54px}
.btn svg{transition:fill 0.3s, stroke 0.3s}
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

.menu-btn{position:fixed;top:16px;left:16px;z-index:20;width:36px;height:36px;border-radius:8px;border:1px solid;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;opacity:0.5}
.menu-btn:hover{opacity:0.9;transform:scale(1.05)}
.menu-btn svg{transition:stroke 0.3s}

.panel-overlay{position:fixed;inset:0;z-index:15;background:rgba(0,0,0,0);pointer-events:none;transition:background 0.3s}
.panel-overlay.open{background:rgba(0,0,0,0.3);pointer-events:all}

.panel{position:fixed;top:0;left:-320px;width:300px;height:100vh;z-index:16;padding:60px 24px 24px;overflow-y:auto;transition:left 0.35s cubic-bezier(0.4,0,0.2,1), background 0.6s, border-color 0.6s;border-right:1px solid}
.panel.open{left:0}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.3);border-radius:2px}

.panel-section{margin-bottom:28px}
.panel-title{font-size:10px;text-transform:uppercase;letter-spacing:3px;margin-bottom:12px;font-weight:500;transition:color 0.6s}

.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.theme-card{padding:10px 12px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.25s}
.theme-card:hover{transform:translateY(-1px)}
.theme-card.active{border-color:currentColor}
.theme-swatch{width:20px;height:20px;border-radius:50%;flex-shrink:0}
.theme-name{font-size:12px;font-weight:400;transition:color 0.6s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.font-list{display:flex;flex-direction:column;gap:6px}
.font-option{padding:8px 12px;border-radius:8px;border:1.5px solid transparent;cursor:pointer;font-size:13px;transition:all 0.25s;display:flex;align-items:center;justify-content:space-between}
.font-option:hover{transform:translateX(2px)}
.font-option.active{border-color:currentColor}
.font-preview{font-size:18px;opacity:0.5}
</style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>

<button class="menu-btn" id="menuBtn" title="Settings">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div class="panel-overlay" id="panelOverlay"></div>

<div class="panel" id="panel">
  <div class="panel-section">
    <div class="panel-title" id="themeTitle">Theme</div>
    <div class="theme-grid" id="themeGrid"></div>
  </div>
  <div class="panel-section">
    <div class="panel-title" id="fontTitle">Font</div>
    <div class="font-list" id="fontList"></div>
  </div>
</div>

<div class="container">
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" id="gs1"/>
          <stop offset="100%" id="gs2"/>
        </linearGradient>
      </defs>
      <circle class="track" cx="100" cy="100" r="90" id="trackCircle"/>
      <circle class="glow" cx="100" cy="100" r="90" id="glow"/>
      <circle class="progress" cx="100" cy="100" r="90" id="progress"/>
    </svg>
    <div class="time-display" id="timeDisplay">
      <input class="field" id="minField" value="03" maxlength="2" inputmode="numeric">
      <span class="sep" id="sepSpan">:</span>
      <input class="field" id="secField" value="00" maxlength="2" inputmode="numeric">
    </div>
    <div class="label" id="stateLabel">ready</div>
  </div>
  <div class="controls">
    <button class="btn" id="resetBtn" title="Reset">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
    <button class="btn primary" id="playBtn" title="Start">
      <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6,3 20,12 6,21"/></svg>
      <svg id="pauseIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><line x1="7" y1="4" x2="7" y2="20"/><line x1="17" y1="4" x2="17" y2="20"/></svg>
    </button>
    <button class="btn" id="addBtn" title="+30s">
      <span class="add-label" style="font-size:11px;font-weight:500">+30</span>
    </button>
  </div>
</div>

<script>
const fonts = [
  { name: 'Outfit', family: "'Outfit', sans-serif", weight: '200', preview: 'Aa' },
  { name: 'Cormorant', family: "'Cormorant Garamond', serif", weight: '300', preview: 'Aa' },
  { name: 'Syne', family: "'Syne', sans-serif", weight: '400', preview: 'Aa' },
  { name: 'IBM Plex', family: "'IBM Plex Sans', sans-serif", weight: '200', preview: 'Aa' },
  { name: 'JetBrains', family: "'JetBrains Mono', monospace", weight: '300', preview: 'Aa' },
  { name: 'Playfair', family: "'Playfair Display', serif", weight: '300', preview: 'Aa' },
  { name: 'Inter Tight', family: "'Inter Tight', sans-serif", weight: '200', preview: 'Aa' },
  { name: 'DM Mono', family: "'DM Mono', monospace", weight: '300', preview: 'Aa' },
  { name: 'Crimson', family: "'Crimson Pro', serif", weight: '300', preview: 'Aa' },
  { name: 'Baskerville', family: "'Libre Baskerville', serif", weight: '400', preview: 'Aa' },
];

const themes = [
  {
    name: 'Midnight', bg: '#0a0a0f',
    grad: ['#6394ff','#ec4899'], track: 'rgba(255,255,255,0.06)',
    text: '#ffffff', textSec: 'rgba(255,255,255,0.3)',
    btnBorder: 'rgba(255,255,255,0.12)', primaryBorder: 'rgba(99,148,255,0.4)',
    primaryBg: 'rgba(99,148,255,0.08)', primaryColor: '#6394ff',
    panelBg: '#0e0e18', panelBorder: 'rgba(255,255,255,0.08)',
    cardBg: 'rgba(255,255,255,0.04)', cardBgHover: 'rgba(255,255,255,0.07)',
    fontIdx: 0, particles: {color:'99,148,255',count:35,speed:0.3}, glowBlur: 8
  },
  {
    name: 'Snow', bg: '#f5f5f0',
    grad: ['#1a1a1a','#555555'], track: 'rgba(0,0,0,0.06)',
    text: '#1a1a1a', textSec: 'rgba(0,0,0,0.25)',
    btnBorder: 'rgba(0,0,0,0.12)', primaryBorder: 'rgba(0,0,0,0.25)',
    primaryBg: 'rgba(0,0,0,0.04)', primaryColor: '#1a1a1a',
    panelBg: '#eeeee8', panelBorder: 'rgba(0,0,0,0.08)',
    cardBg: 'rgba(0,0,0,0.03)', cardBgHover: 'rgba(0,0,0,0.06)',
    fontIdx: 1, particles: null, glowBlur: 4
  },
  {
    name: 'Ember', bg: '#1a0a08',
    grad: ['#ff6b35','#ff2e63'], track: 'rgba(255,107,53,0.08)',
    text: '#ffe0d0', textSec: 'rgba(255,180,150,0.35)',
    btnBorder: 'rgba(255,107,53,0.2)', primaryBorder: 'rgba(255,107,53,0.4)',
    primaryBg: 'rgba(255,107,53,0.08)', primaryColor: '#ff6b35',
    panelBg: '#1a0e0a', panelBorder: 'rgba(255,107,53,0.1)',
    cardBg: 'rgba(255,107,53,0.05)', cardBgHover: 'rgba(255,107,53,0.1)',
    fontIdx: 2, particles: {color:'255,107,53',count:25,speed:0.4}, glowBlur: 12
  },
  {
    name: 'Ocean', bg: '#0a1628',
    grad: ['#00d4aa','#0099ff'], track: 'rgba(0,212,170,0.06)',
    text: '#d0f0ea', textSec: 'rgba(0,212,170,0.3)',
    btnBorder: 'rgba(0,212,170,0.2)', primaryBorder: 'rgba(0,212,170,0.4)',
    primaryBg: 'rgba(0,212,170,0.08)', primaryColor: '#00d4aa',
    panelBg: '#0c1a2e', panelBorder: 'rgba(0,212,170,0.1)',
    cardBg: 'rgba(0,212,170,0.04)', cardBgHover: 'rgba(0,212,170,0.08)',
    fontIdx: 3, particles: {color:'0,212,170',count:30,speed:0.2}, glowBlur: 10
  },
  {
    name: 'Lavender', bg: '#f0ecf8',
    grad: ['#8b5cf6','#c084fc'], track: 'rgba(139,92,246,0.1)',
    text: '#3b1f7a', textSec: 'rgba(139,92,246,0.35)',
    btnBorder: 'rgba(139,92,246,0.2)', primaryBorder: 'rgba(139,92,246,0.35)',
    primaryBg: 'rgba(139,92,246,0.06)', primaryColor: '#8b5cf6',
    panelBg: '#e8e3f4', panelBorder: 'rgba(139,92,246,0.1)',
    cardBg: 'rgba(139,92,246,0.05)', cardBgHover: 'rgba(139,92,246,0.1)',
    fontIdx: 0, particles: null, glowBlur: 6
  },
  {
    name: 'Terminal', bg: '#0d1117',
    grad: ['#39d353','#26a641'], track: 'rgba(57,211,83,0.08)',
    text: '#39d353', textSec: 'rgba(57,211,83,0.3)',
    btnBorder: 'rgba(57,211,83,0.2)', primaryBorder: 'rgba(57,211,83,0.4)',
    primaryBg: 'rgba(57,211,83,0.06)', primaryColor: '#39d353',
    panelBg: '#0f1519', panelBorder: 'rgba(57,211,83,0.1)',
    cardBg: 'rgba(57,211,83,0.04)', cardBgHover: 'rgba(57,211,83,0.08)',
    fontIdx: 4, particles: {color:'57,211,83',count:15,speed:0.15}, glowBlur: 6
  },
  {
    name: 'Rose Gold', bg: '#1c1418',
    grad: ['#e8a87c','#d4789c'], track: 'rgba(232,168,124,0.08)',
    text: '#f0d5c0', textSec: 'rgba(232,168,124,0.35)',
    btnBorder: 'rgba(232,168,124,0.2)', primaryBorder: 'rgba(232,168,124,0.4)',
    primaryBg: 'rgba(232,168,124,0.08)', primaryColor: '#e8a87c',
    panelBg: '#1e161a', panelBorder: 'rgba(232,168,124,0.1)',
    cardBg: 'rgba(232,168,124,0.05)', cardBgHover: 'rgba(232,168,124,0.1)',
    fontIdx: 5, particles: {color:'232,168,124',count:20,speed:0.2}, glowBlur: 10
  },
  {
    name: 'Arctic', bg: '#ffffff',
    grad: ['#0ea5e9','#6366f1'], track: 'rgba(14,165,233,0.08)',
    text: '#0f172a', textSec: 'rgba(14,165,233,0.35)',
    btnBorder: 'rgba(14,165,233,0.2)', primaryBorder: 'rgba(14,165,233,0.35)',
    primaryBg: 'rgba(14,165,233,0.06)', primaryColor: '#0ea5e9',
    panelBg: '#f4f8fc', panelBorder: 'rgba(14,165,233,0.1)',
    cardBg: 'rgba(14,165,233,0.04)', cardBgHover: 'rgba(14,165,233,0.08)',
    fontIdx: 6, particles: null, glowBlur: 4
  },
  {
    name: 'Noir', bg: '#000000',
    grad: ['#ffffff','#999999'], track: 'rgba(255,255,255,0.06)',
    text: '#ffffff', textSec: 'rgba(255,255,255,0.25)',
    btnBorder: 'rgba(255,255,255,0.15)', primaryBorder: 'rgba(255,255,255,0.3)',
    primaryBg: 'rgba(255,255,255,0.04)', primaryColor: '#ffffff',
    panelBg: '#0a0a0a', panelBorder: 'rgba(255,255,255,0.08)',
    cardBg: 'rgba(255,255,255,0.04)', cardBgHover: 'rgba(255,255,255,0.08)',
    fontIdx: 7, particles: null, glowBlur: 3
  },
  {
    name: 'Solar', bg: '#12100e',
    grad: ['#fbbf24','#f59e0b'], track: 'rgba(251,191,36,0.06)',
    text: '#fef3c7', textSec: 'rgba(251,191,36,0.3)',
    btnBorder: 'rgba(251,191,36,0.2)', primaryBorder: 'rgba(251,191,36,0.4)',
    primaryBg: 'rgba(251,191,36,0.08)', primaryColor: '#fbbf24',
    panelBg: '#161210', panelBorder: 'rgba(251,191,36,0.1)',
    cardBg: 'rgba(251,191,36,0.04)', cardBgHover: 'rgba(251,191,36,0.08)',
    fontIdx: 8, particles: {color:'251,191,36',count:20,speed:0.25}, glowBlur: 14
  },
  {
    name: 'Forest', bg: '#DFEEE2',
    grad: ['#438951','#4A644E'], track: 'rgba(67,137,81,0.12)',
    text: '#3B4540', textSec: 'rgba(64,84,73,0.4)',
    btnBorder: 'rgba(67,137,81,0.25)', primaryBorder: 'rgba(67,137,81,0.45)',
    primaryBg: 'rgba(67,137,81,0.08)', primaryColor: '#438951',
    panelBg: '#d4e6d7', panelBorder: 'rgba(67,137,81,0.15)',
    cardBg: 'rgba(67,137,81,0.06)', cardBgHover: 'rgba(67,137,81,0.12)',
    fontIdx: 0, particles: null, glowBlur: 6
  }
];

const C = 2 * Math.PI * 90;
const $ = id => document.getElementById(id);
const progress = $('progress'), glow = $('glow'), trackCircle = $('trackCircle');
const timeDisplay = $('timeDisplay'), stateLabel = $('stateLabel');
const playBtn = $('playBtn'), resetBtn = $('resetBtn'), addBtn = $('addBtn');
const playIcon = $('playIcon'), pauseIcon = $('pauseIcon');
const minField = $('minField'), secField = $('secField'), sepSpan = $('sepSpan');
const gs1 = $('gs1'), gs2 = $('gs2');
const bgCanvas = $('bgCanvas'), bgCtx = bgCanvas.getContext('2d');
const menuBtn = $('menuBtn'), panel = $('panel'), panelOverlay = $('panelOverlay');
const themeGrid = $('themeGrid'), fontList = $('fontList');
const themeTitle = $('themeTitle'), fontTitle = $('fontTitle');

progress.style.strokeDasharray = C;
glow.style.strokeDasharray = C;

let totalSeconds = 180, remaining = 180, running = false, interval = null;
let currentTheme = 0, currentFont = 0;
let dots = [], W, H;

function resize() { W = bgCanvas.width = window.innerWidth; H = bgCanvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

function setProgress(frac) { const o = C*(1-frac); progress.style.strokeDashoffset=o; glow.style.strokeDashoffset=o; }
function pad(n) { return String(n).padStart(2,'0'); }
function isEditing() { return document.activeElement===minField||document.activeElement===secField; }

function render() {
  if (!isEditing()) { minField.value=pad(Math.floor(remaining/60)); secField.value=pad(remaining%60); }
  setProgress(totalSeconds>0?remaining/totalSeconds:0);
  if (remaining<=0&&running) { stop(); stateLabel.textContent='done'; pulse(); }
}

function readFields() {
  const mR=minField.value.trim(), sR=secField.value.trim();
  if (mR===''&&sR==='') return 1;
  let m=parseInt(mR),s=parseInt(sR);
  if(isNaN(m))m=0; if(isNaN(s))s=0;
  m=Math.max(0,Math.min(99,m)); s=Math.max(0,Math.min(59,s));
  const t=m*60+s; return t===0?1:t;
}

function commitFields() {
  const t=readFields(); totalSeconds=t; remaining=t;
  minField.value=pad(Math.floor(remaining/60)); secField.value=pad(remaining%60);
  stateLabel.textContent='ready'; render(); syncToUrl();
}

function start() {
  if(isEditing()){commitFields();minField.blur();secField.blur();}
  if(remaining<=0)return;
  running=true; stateLabel.textContent='running';
  playIcon.style.display='none'; pauseIcon.style.display='block';
  interval=setInterval(()=>{remaining=Math.max(0,remaining-1);render();},1000);
}

function stop() {
  running=false; clearInterval(interval); interval=null;
  if(remaining>0)stateLabel.textContent='paused';
  playIcon.style.display='block'; pauseIcon.style.display='none';
}

function reset() { stop(); remaining=totalSeconds; stateLabel.textContent='ready'; render(); }

function pulse() {
  progress.style.transition='none'; glow.style.transition='none';
  let on=true,count=0;
  const blink=setInterval(()=>{
    progress.style.opacity=on?0.3:1; glow.style.opacity=on?0.03:0.12;
    on=!on; count++;
    if(count>5){clearInterval(blink);progress.style.opacity=1;glow.style.opacity=0.12;
      progress.style.transition='stroke-dashoffset 0.3s ease, stroke 0.6s';
      glow.style.transition='stroke-dashoffset 0.3s ease, stroke 0.6s';}
  },300);
}

function applyFont(fi) {
  currentFont = fi;
  const f = fonts[fi];
  const fontSize = 'min(14vmin, 72px)';
  [minField, secField].forEach(el => { el.style.fontFamily=f.family; el.style.fontSize=fontSize; el.style.fontWeight=f.weight; });
  sepSpan.style.fontFamily=f.family; sepSpan.style.fontSize=fontSize; sepSpan.style.fontWeight=f.weight;
  stateLabel.style.fontFamily=f.family;
  document.querySelectorAll('.font-option').forEach((el,i) => el.classList.toggle('active', i===fi));
  if(typeof syncToUrl==='function') syncToUrl();
}

function applyTheme(i) {
  const t = themes[i]; currentTheme = i;
  document.body.style.background = t.bg;
  gs1.setAttribute('stop-color', t.grad[0]); gs2.setAttribute('stop-color', t.grad[1]);
  trackCircle.style.stroke = t.track;
  glow.style.filter = `blur(${t.glowBlur}px)`;

  [minField, secField].forEach(el => { el.style.color=t.text; el.style.caretColor=t.primaryColor; });
  sepSpan.style.color = t.textSec;
  stateLabel.style.color = t.textSec;

  document.querySelectorAll('.btn').forEach(b => { b.style.borderColor=t.btnBorder; b.style.color=t.text; b.style.background='transparent'; });
  playBtn.style.borderColor=t.primaryBorder; playBtn.style.background=t.primaryBg; playBtn.style.color=t.primaryColor;
  document.querySelector('.add-label').style.color='inherit';

  menuBtn.style.borderColor=t.btnBorder; menuBtn.style.color=t.textSec;
  panel.style.background=t.panelBg; panel.style.borderColor=t.panelBorder;
  themeTitle.style.color=t.textSec; fontTitle.style.color=t.textSec;

  document.querySelectorAll('.theme-card').forEach((c,idx) => {
    c.style.background = idx===i ? t.cardBgHover : t.cardBg;
    c.style.color = t.text;
    c.classList.toggle('active', idx===i);
  });
  document.querySelectorAll('.theme-name').forEach(n => n.style.color=t.text);
  document.querySelectorAll('.font-option').forEach(f => {
    f.style.background=t.cardBg; f.style.color=t.text;
  });

  applyFont(t.fontIdx);
  initParticles(t);
  if(typeof syncToUrl==='function') syncToUrl();
}

function initParticles(t) {
  dots=[];
  if(!t.particles)return;
  for(let i=0;i<t.particles.count;i++){
    dots.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.5,
      dx:(Math.random()-0.5)*t.particles.speed,dy:(Math.random()-0.5)*t.particles.speed,
      o:Math.random()*0.25+0.03});
  }
}

function drawBg() {
  bgCtx.clearRect(0,0,W,H);
  const t=themes[currentTheme];
  if(t.particles&&dots.length>0){
    dots.forEach(d=>{
      d.x+=d.dx;d.y+=d.dy;
      if(d.x<0)d.x=W;if(d.x>W)d.x=0;if(d.y<0)d.y=H;if(d.y>H)d.y=0;
      bgCtx.beginPath();bgCtx.arc(d.x,d.y,d.r,0,Math.PI*2);
      bgCtx.fillStyle=`rgba(${t.particles.color},${d.o})`;bgCtx.fill();
    });
  }
  requestAnimationFrame(drawBg);
}

function openPanel() { panel.classList.add('open'); panelOverlay.classList.add('open'); }
function closePanel() { panel.classList.remove('open'); panelOverlay.classList.remove('open'); }

menuBtn.addEventListener('click', () => panel.classList.contains('open') ? closePanel() : openPanel());
panelOverlay.addEventListener('click', closePanel);

themes.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'theme-card';
  card.innerHTML = `<div class="theme-swatch" style="background:linear-gradient(135deg,${t.grad[0]},${t.grad[1]})"></div><div class="theme-name">${t.name}</div>`;
  card.addEventListener('click', () => applyTheme(i));
  themeGrid.appendChild(card);
});

fonts.forEach((f, i) => {
  const opt = document.createElement('div');
  opt.className = 'font-option';
  opt.innerHTML = `<span>${f.name}</span><span class="font-preview" style="font-family:${f.family};font-weight:${f.weight}">${f.preview}</span>`;
  opt.addEventListener('click', () => applyFont(i));
  fontList.appendChild(opt);
});

[minField, secField].forEach(f => {
  f.addEventListener('focus', () => { if(running){f.blur();return;} timeDisplay.classList.add('editing'); f.select(); });
  f.addEventListener('blur', () => { timeDisplay.classList.remove('editing'); commitFields(); });
  f.addEventListener('keydown', (e) => {
    if(e.key==='Enter'){f.blur();return;} if(e.key==='Tab')return;
    if(['ArrowLeft','ArrowRight','Backspace','Delete','Home','End'].includes(e.key))return;
    if(e.ctrlKey||e.metaKey)return;
    if(!/^\d$/.test(e.key)){e.preventDefault();return;}
    if(f.selectionStart===f.selectionEnd&&f.value.length>=2){e.preventDefault();f.value=e.key;f.setSelectionRange(1,1);}
  });
  f.addEventListener('input', () => { f.value=f.value.replace(/\D/g,'').slice(0,2); });
});

playBtn.addEventListener('click', () => running ? stop() : start());
resetBtn.addEventListener('click', reset);
addBtn.addEventListener('click', () => { if(isEditing())commitFields(); remaining+=30; totalSeconds=Math.max(totalSeconds,remaining); render(); });

function syncToUrl() {
  const m = Math.floor(totalSeconds/60), s = totalSeconds%60;
  const params = `?t=${pad(m)}:${pad(s)}&theme=${currentTheme}&font=${currentFont}`;
  history.replaceState(null, '', params);
}

function parseUrl() {
  let raw = location.search.slice(1);
  if (!raw) raw = location.hash.slice(1);
  if (!raw) return null;
  const params = {};
  raw.split('&').forEach(p => { const [k,v] = p.split('='); if(k&&v) params[k]=decodeURIComponent(v); });
  return params;
}

const urlParams = parseUrl();

if (urlParams && urlParams.t) {
  const parts = urlParams.t.split(':');
  if (parts.length===2) {
    let m=parseInt(parts[0]), s=parseInt(parts[1]);
    if(!isNaN(m)&&!isNaN(s)) {
      m=Math.max(0,Math.min(99,m)); s=Math.max(0,Math.min(59,s));
      totalSeconds=m*60+s; remaining=totalSeconds;
    }
  }
}

const initTheme = (urlParams && !isNaN(parseInt(urlParams.theme))) ? Math.min(parseInt(urlParams.theme), themes.length-1) : 0;
applyTheme(initTheme);

if (urlParams && !isNaN(parseInt(urlParams.font))) {
  applyFont(Math.min(parseInt(urlParams.font), fonts.length-1));
}

drawBg();
render();
syncToUrl();
</script>
</body>
</html>
